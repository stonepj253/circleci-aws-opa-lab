version: 2.1
jobs:
  policy-validation:
    docker:
      - image: cimg/python:3.9
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: |
            # Download direct from GitHub Release mirror to bypass 404 HTML redirection issues
            curl -L -o opa https://github.com
            chmod +x opa
            sudo mv opa /usr/local/bin/
            sudo apt-get update && sudo apt-get install -y jq
      - run:
          name: Test OPA Policies
          command: opa test policies/ tests/
  deploy-compliant-infrastructure:
    docker:
      - image: cimg/aws:2026.04
    environment:
      AWS_DEFAULT_REGION: us-east-1
      AWS_STS_REGIONAL_ENDPOINTS: global
    steps:
      - checkout
      - run:
          name: Run Lab Check
          command: |
            export AWS_ROLE_ARN='arn:aws:iam::126104434750:role/CircleCILabRole'
            export AWS_WEB_IDENTITY_TOKEN_FILE='/tmp/web-identity-token'
            echo \ > \
            aws sts get-caller-identity
workflows:
  security-pipeline:
    jobs:
      - policy-validation
      - deploy-compliant-infrastructure:
          context: aws-oidc-context
          requires:
            - policy-validation
