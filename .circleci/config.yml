version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.4.2

jobs:
  policy-validation:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Clean, Download and Install OPA Binary
          command: |
            # Clear old file variants
            sudo rm -f /usr/local/bin/opa

            # Use the verified absolute GitHub Release distribution path
            curl -L --fail -o /tmp/opa "https://github.com/open-policy-agent/opa/releases/download/v0.58.0/opa_linux_amd64"
            chmod +x /tmp/opa
            sudo mv /tmp/opa /usr/local/bin/opa
      - run:
          name: Test OPA Policies
          command: |
            echo "Running OPA validation suite..."
            opa test policies/ tests/ -v

  deploy-compliant-infrastructure:
    docker:
      - image: cimg/aws:2026.04
    environment:
      AWS_DEFAULT_REGION: us-east-1
      AWS_STS_REGIONAL_ENDPOINTS: global
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: "arn:aws:iam::126104434750:role/CircleCILabRole"
          region: us-east-1
          role_session_name: "circleci-lab-check"
      - run:
          name: Run Lab Check
          command: aws sts get-caller-identity

workflows:
  security-pipeline:
    jobs:
      - policy-validation
      - deploy-compliant-infrastructure:
          context: aws-oidc-context
          requires:
            - policy-validation
